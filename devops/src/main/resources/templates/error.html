<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Sistema DevOps</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .error-box{max-width:800px;margin:5rem auto;padding:2rem;background:white;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.08);}
        .error-code{font-size:3rem;font-weight:700;color:#1f6feb}
        .error-msg{margin-top:1rem;color:#333}
        .error-path{margin-top:.5rem;color:#666;font-size:.9rem}
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">📚 Sistema DevOps</div>
            <ul class="nav-links">
                <li><a href="/home">Início</a></li>
            </ul>
        </div>
    </nav>

    <div class="error-box">
        <div style="text-align:center">
            <div class="error-code" th:text="${status}">Erro</div>
            <h2 style="margin:0.5rem 0;">Ops — algo deu errado</h2>
            <p class="error-msg" th:text="${message}">Ocorreu um erro inesperado.</p>
            <p class="error-path">Caminho: <span th:text="${path}">/</span></p>
            <div style="margin-top:1.5rem;">
                <a href="/home" class="btn btn-primary">Voltar para Home</a>
            </div>
        </div>
    </div>
</body>
</html>
