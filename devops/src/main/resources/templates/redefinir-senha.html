<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Sistema DevOps</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-panel">
            <div class="auth-brand">
                <span class="auth-badge">Sistema DevOps</span>
                <h1>Redefinir senha</h1>
                <p>Crie uma nova senha com pelo menos 6 caracteres.</p>
            </div>

            <form class="auth-form" th:action="@{/redefinir-senha}" method="post">
                <div class="alerta alerta-sucesso" th:if="${mensagemSucesso}">
                    <span th:text="${mensagemSucesso}"></span>
                </div>

                <div class="alerta alerta-erro" th:if="${mensagemErro}">
                    <span th:text="${mensagemErro}"></span>
                </div>

                <input type="hidden" name="token" th:value="${token}">

                <div class="form-group">
                    <label for="novaSenha">Nova senha</label>
                    <input type="password" id="novaSenha" name="novaSenha" placeholder="Digite sua nova senha" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmaSenha">Confirmar senha</label>
                    <input type="password" id="confirmaSenha" name="confirmaSenha" placeholder="Confirme sua nova senha" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Redefinir senha</button>

                <div class="auth-links">
                    <a th:href="@{/login}">Voltar para o login</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
