<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Sistema DevOps</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Sistema DevOps</div>
            <ul class="nav-links">
                <li><a href="/home">Home</a></li>
                <li><a href="/curso/listar">Cursos</a></li>
                <li><a href="/aluno/listar">Alunos</a></li>
                <li><a href="/professor/listar">Professores</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-header">
        <h1>Recuperar Senha</h1>
        <p>Digite seu email para receber um link de recuperação</p>
    </div>

    <div class="container">
        <div class="form-container" style="max-width: 520px; margin: 0 auto;">
            <form th:action="@{/recuperar-senha}" method="post">
                <h2 class="form-title">Recuperação de Senha</h2>

                <div class="alerta" th:if="${mensagemSucesso}" style="color: green; margin-bottom: 1rem;">
                    <p>✅ <span th:text="${mensagemSucesso}"></span></p>
                </div>

                <div class="alerta" th:if="${mensagemErro}" style="color: red; margin-bottom: 1rem;">
                    <p>❌ <span th:text="${mensagemErro}"></span></p>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email cadastrado" required autofocus>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Enviar Link de Recuperação</button>
                    <a href="/login" class="btn btn-secondary">Voltar para Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
