<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema DevOps</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-panel">
            <div class="auth-brand">
                <span class="auth-badge">Sistema DevOps</span>
                <h1>Acessar sistema</h1>
                <p>Entre com seu usuario e senha para continuar.</p>
            </div>

            <form class="auth-form" th:action="@{/login}" method="post">
                <div class="alerta alerta-erro" th:if="${param.error}">
                    Login ou senha invalidos. Tente novamente.
                </div>

                <div class="alerta alerta-sucesso" th:if="${param.logout}">
                    Voce saiu do sistema com sucesso.
                </div>

                <div class="alerta alerta-sucesso" th:if="${mensagemSucesso}">
                    <span th:text="${mensagemSucesso}"></span>
                </div>

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Digite seu usuario" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Entrar</button>

                <div class="auth-links">
                    <a th:href="@{/recuperar-senha}">Esqueceu sua senha?</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
