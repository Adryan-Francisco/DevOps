<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema DevOps</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">Sistema DevOps</div>
            <ul class="nav-links">
                <li><a href="/home">Home</a></li>
                <li><a href="/curso/listar">Cursos</a></li>
                <li><a href="/aluno/listar">Alunos</a></li>
                <li><a href="/professor/listar">Professores</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-header">
        <h1>Acessar Sistema</h1>
        <p>Entre com seu login e senha para continuar</p>
    </div>

    <div class="container">
        <div class="form-container" style="max-width: 520px; margin: 0 auto;">
            <form th:action="@{/login}" method="post">
                <h2 class="form-title">Login</h2>

                <div class="alerta" th:if="${param.error}" style="color: red; margin-bottom: 1rem;">
                    <p>❌ Login ou senha inválidos. Tente novamente.</p>
                </div>

                <div class="alerta" th:if="${param.logout}" style="color: green; margin-bottom: 1rem;">
                    <p>✅ Você saiu do sistema com sucesso.</p>
                </div>

                <div class="form-group">
                    <label for="username">Login:</label>
                    <input type="text" id="username" name="username" placeholder="Digite seu login" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                    <a href="/home" class="btn btn-secondary">Voltar</a>
                </div>
            </form>

                
        </div>
    </div>
</body>
</html>
