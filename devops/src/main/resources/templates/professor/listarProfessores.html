<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listar Professores</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo"> Sistema DevOps</div>
            <ul class="nav-links">
                <li><a href="/">Início</a></li>
                <li><a href="/aluno/listar">Alunos</a></li>
                <li><a href="/curso/listar">Cursos</a></li>
                <li><a href="/professor/listar">Professores</a></li>
                <li><a href="/disciplina/listar">Disciplinas</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-header">
        <h1>Professores</h1>
        <p>Gerencie os dados dos professores da instituição</p>
    </div>

    <div class="container">
        <div class="alerta" th:if="${mensagem}">
            <p th:text="${mensagem}"></p>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Lista de Professores</h2>
                <a href="/professor/formulario" class="btn btn-primary">➕ Novo Professor</a>
            </div>

            <div style="overflow-x: auto;">
                <table class="tabela">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>Graduação</th>
                            <th>RM</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="professor : ${professores}">
                            <td th:text="${professor.idProfessor}"></td>
                            <td th:text="${professor.nomeProfessor}"></td>
                            <td th:text="${professor.telefoneProfessor}"></td>
                            <td th:text="${professor.graduacaoProfessor}"></td>
                            <td th:text="${professor.rmProfessor}"></td>
                            <td>
                                <div class="acoes">
                                    <a th:href="@{/professor/editar/{id}(id=${professor.idProfessor})}" class="btn btn-small btn-info">✏️ Editar</a>
                                    <a th:href="@{/professor/deletar/{id}(id=${professor.idProfessor})}" class="btn btn-small btn-danger" onclick="return confirm('Tem certeza que deseja deletar?')">🗑️ Deletar</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-3">
            <a href="/" class="btn btn-secondary"> Voltar</a>
        </div>
    </div>
</body>
</html>
