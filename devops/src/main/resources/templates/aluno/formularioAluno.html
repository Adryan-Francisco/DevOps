<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Aluno</title>
    <link rel="stylesheet" href="/css/styles.css?v=2">
</head>
<body class="pagina-formulario">

    <div class="container">
        <div class="card-formulario">

            <header class="topo-formulario">
                <h1>Formulário de Aluno</h1>
                <p>Preencha os dados abaixo para cadastrar ou editar um aluno.</p>
                <a class="link-voltar" th:href="@{/alunos}">← Voltar para a lista de alunos</a>
            </header>

            <main>
                <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post" class="form-grid">

                    <input type="hidden" th:field="*{idAluno}">

                    <div class="campo">
                        <label for="nomeAluno">Nome</label>
                        <input type="text" id="nomeAluno" th:field="*{nomeAluno}" placeholder="Digite o nome completo" required>
                    </div>

                    <div class="campo">
                        <label for="emailAluno">Email</label>
                        <input type="email" id="emailAluno" th:field="*{emailAluno}" placeholder="exemplo@email.com" required>
                    </div>

                    <div class="campo">
                        <label for="telefoneAluno">Telefone</label>
                        <input type="text" id="telefoneAluno" th:field="*{telefoneAluno}" placeholder="(00) 00000-0000" required>
                    </div>

                    <div class="campo">
                        <label for="cpfAluno">CPF</label>
                        <input type="text" id="cpfAluno" th:field="*{cpfAluno}" placeholder="000.000.000-00" required>
                    </div>

                    <div class="campo campo-largo">
                        <label for="enderecoAluno">Endereço</label>
                        <input type="text" id="enderecoAluno" th:field="*{enderecoAluno}" placeholder="Rua, número, bairro" required>
                    </div>

                    <div class="campo">
                        <label for="raAluno">RA</label>
                        <input type="text" id="raAluno" th:field="*{raAluno}" placeholder="Digite o RA" required>
                    </div>

                    <div class="acoes campo-largo">
                        <button type="submit" class="btn-salvar">Salvar</button>
                        <a class="btn-cancelar" th:href="@{/alunos}">Cancelar</a>
                    </div>

                </form>
            </main>

        </div>
    </div>

</body>
</html>
