<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Aluno</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header>
        <h1 align="center">Formulário de Aluno</h1>
        <h2 align="center">
            <a th:href="@{/alunos}">Voltar para a lista de alunos</a>
        </h2>
    </header>

    <main>
        <section>
            <h2 align="center">Cadastro de Aluno</h2>

            <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">

                <div>
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" th:field="*{nome}" required>
                </div>
                <br/>

                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" th:field="*{email}" required>
                </div>
                <br/>

                <div>
                    <label for="telefone">Telefone:</label>
                    <input type="text" id="telefone" th:field="*{telefone}" required>
                </div>
                <br/>

                <div>
                    <label for="endereco">Endereço:</label>
                    <input type="text" id="endereco" th:field="*{endereco}" required>
                </div>
                <br/>

                <div>
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" th:field="*{cpf}" required>
                </div>
                <br/>

                <div>
                    <label for="ra">RA:</label>
                    <input type="text" id="ra" th:field="*{ra}" required>   
                </div>
                <br/>

                <button type="submit">Salvar</button>

            </form>
        </section>
    </main>

</body>
</html>
