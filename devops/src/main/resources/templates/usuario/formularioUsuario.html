<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Formulário de Usuário</title>
	<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav>
	<div class="nav-container">
		<div class="logo">Sistema DevOps</div>
		<ul class="nav-links">
			<li><a href="/">Início</a></li>
			<li><a href="/usuario/listar">Listar Usuários</a></li>
		</ul>
	</div>
</nav>

<div class="page-header">
	<h1 th:text="${usuario.idUsuario == null ? 'Novo Usuário' : 'Editar Usuário'}">Novo Usuário</h1>
	<p>Cadastre um novo acesso com nome, login, senha e perfil</p>
</div>


<div class="container form-shell">
	<form th:action="@{/usuario/salvar}" th:object="${usuario}" method="post" class="form-card form-grid" novalidate>
		<div th:if="${#fields.hasAnyErrors()}" class="alerta" style="grid-column: 1 / -1; margin-bottom: 0;">
			Verifique os campos destacados abaixo.
		</div>
		<input type="hidden" th:field="*{idUsuario}">

		<div class="form-group">
			<label for="nomeUsuario">Nome</label>
			<input type="text" id="nomeUsuario" th:field="*{nomeUsuario}" th:classappend="${#fields.hasErrors('nomeUsuario')} ? 'is-invalid' : ''" required>
			<small class="field-error" th:if="${#fields.hasErrors('nomeUsuario')}" th:errors="*{nomeUsuario}"></small>
		</div>

		<div class="form-group">
			<label for="emailUsuario">Email</label>
			<input type="email" id="emailUsuario" th:field="*{emailUsuario}" th:classappend="${#fields.hasErrors('emailUsuario')} ? 'is-invalid' : ''" required>
			<small class="field-error" th:if="${#fields.hasErrors('emailUsuario')}" th:errors="*{emailUsuario}"></small>
		</div>

		<div class="form-group">
			<label for="loginUsuario">Login</label>
			<input type="text" id="loginUsuario" th:field="*{loginUsuario}" th:classappend="${#fields.hasErrors('loginUsuario')} ? 'is-invalid' : ''" required>
			<small class="field-error" th:if="${#fields.hasErrors('loginUsuario')}" th:errors="*{loginUsuario}"></small>
		</div>

		<div class="form-group">
			<label for="senhaUsuario">Senha</label>
			<input type="password" id="senhaUsuario" th:field="*{senhaUsuario}" th:classappend="${#fields.hasErrors('senhaUsuario')} ? 'is-invalid' : ''" required>
			<small class="field-error" th:if="${#fields.hasErrors('senhaUsuario')}" th:errors="*{senhaUsuario}"></small>
		</div>

		<div class="form-group">
			<label for="roleUsuario">Role</label>
			<select id="roleUsuario" th:field="*{roleUsuario}" th:classappend="${#fields.hasErrors('roleUsuario')} ? 'is-invalid' : ''" required>
				<option value="" disabled th:selected="${usuario.roleUsuario == null || usuario.roleUsuario.isBlank()}">Selecione</option>
				<option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
			</select>
			<small class="field-error" th:if="${#fields.hasErrors('roleUsuario')}" th:errors="*{roleUsuario}"></small>
		</div>

		<div class="form-actions">
			<button type="submit" class="btn btn-primary">Salvar</button>
			<a href="/usuario/listar" class="btn btn-secondary">Cancelar</a>
		</div>
	</form>
</div>
</body>
</html>
