<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuários</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<nav>
    <div class="nav-container">
        <div class="logo">📚 Sistema DevOps</div>
        <ul class="nav-links">
            <li><a href="/home">Início</a></li>
            <li><a href="/aluno/listar">Alunos</a></li>
            <li><a href="/curso/listar">Cursos</a></li>
            <li><a href="/professor/listar">Professores</a></li>
            <li><a href="/disciplina/listar">Disciplinas</a></li>
            <li><a href="/usuario/listar">Usuários</a></li>
            <li style="margin-left: auto;"><a href="/logout" class="btn btn-danger" style="padding: 0.5rem 1rem; display: inline-block;">🚪 Logout</a></li>
        </ul>
    </div>
</nav>

<div class="page-header">
    <h1>Usuários</h1>
    <p>Gerencie os acessos cadastrados no sistema</p>
</div>

<div class="container">
    <div th:if="${mensagem}" class="alerta" th:text="${mensagem}"></div>
    <div class="table-container">
        <div class="table-header">
            <h2>Lista de usuários</h2>
            <a href="/usuario/formulario" class="btn btn-primary btn-small">Novo Usuário</a>
        </div>
    <table class="tabela">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Login</th>
                <th>Role</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.nomeUsuario}"></td>
                <td th:text="${usuario.emailUsuario}"></td>
                <td th:text="${usuario.loginUsuario}"></td>
                <td th:text="${usuario.roleUsuario}"></td>
                <td class="acoes">
                    <a th:href="@{/usuario/editar/{id}(id=${usuario.idUsuario})}" class="btn btn-info btn-small">Editar</a>
                    <a th:href="@{/usuario/deletar/{id}(id=${usuario.idUsuario})}" class="btn btn-danger btn-small" onclick="return confirm('Deseja realmente excluir este usuário?')">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>
    </div>
    <div class="text-center mt-3" style="margin-top: 2rem;">
        <a href="/home" class="btn btn-secondary">↩️ Voltar</a>
    </div>
</div>
</body>
</html>
